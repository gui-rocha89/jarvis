name: Deploy para VPS

on:
  workflow_run:
    workflows: ["CI - Testes"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Tenta ssh-keyscan com timeout de 10s; se falhar, desabilita verificação de host
          if ! timeout 10 ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan falhou, usando StrictHostKeyChecking=no"
            echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null" >> ~/.ssh/config
            chmod 600 ~/.ssh/config
          fi

      - name: Deploy arquivos
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='auth_session' \
            --exclude='.env' \
            --exclude='google-calendar-key.json' \
            --exclude='*.bak' \
            --exclude='audio_files' \
            --exclude='media_files' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 -o ServerAliveInterval=15" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/jarvis/

      - name: Instalar deps e reiniciar
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=30 -o ServerAliveInterval=15 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          cd /opt/jarvis
          npm ci --production
          pm2 restart jarvis 2>/dev/null || npx pm2 restart jarvis
          sleep 5
          pm2 status jarvis 2>/dev/null || npx pm2 status jarvis
          EOF
